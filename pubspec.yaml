name: spidee
description: "A professional iOS 18 style launcher developed in Flutter."

# బిల్డ్ ఫెయిల్ అవ్వకుండా ఉండటానికి ఇది అత్యంత ముఖ్యం
environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # iOS ఐకాన్స్ మరియు డిజైన్ కోసం
  cupertino_icons: ^1.0.8
  
  # ఫోన్‌లోని యాప్స్ లిస్ట్ పొందడానికి మరియు ఓపెన్ చేయడానికి
  device_apps: ^2.2.0
  installed_apps: ^1.4.1
  
  # iOS 18 బ్లర్ (Frosted Glass) ఎఫెక్ట్ కోసం
  glassmorphism: ^3.0.0
  
  # పర్మిషన్ల మేనేజ్‌మెంట్ కోసం
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # లింటింగ్ రూల్స్
  flutter_lints: ^3.0.0

# అసెట్స్ (ఇమేజెస్/వాల్‌పేపర్స్) ఇక్కడ యాడ్ చేసుకోవాలి
flutter:
  uses-material-design: true

  # మీరు ఒకవేళ లోకల్ ఇమేజెస్ వాడుతుంటే ఇక్కడ అన్‌కామెంట్ చేయండి
  # assets:
  #   - assets/images/ios18_wallpaper.jpg
